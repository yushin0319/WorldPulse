name: Deploy

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
        working-directory: worker
      - name: wrangler deploy (with Sentry release tag)
        run: bunx wrangler deploy --var SENTRY_RELEASE:${{ github.sha }}
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Notify obs-notify on failure
        if: failure()
        run: |
          curl -s -X POST "$N8N_WEBHOOK_URL/obs-notify" \
            -H "Content-Type: application/json" \
            -d '{"severity":"warning","service":"github-actions","repo":"WorldPulse","subject":"⚠ WorldPulse Worker デプロイ失敗","summary":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}

  deploy-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
        working-directory: worker
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bunx tsc -b
        working-directory: frontend
      - run: bunx vite build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      - run: bunx wrangler pages deploy dist --project-name=worldpulse --commit-message="deploy ${{ github.sha }}"
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Notify obs-notify on failure
        if: failure()
        run: |
          curl -s -X POST "$N8N_WEBHOOK_URL/obs-notify" \
            -H "Content-Type: application/json" \
            -d '{"severity":"warning","service":"github-actions","repo":"WorldPulse","subject":"⚠ WorldPulse Frontend デプロイ失敗","summary":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}","url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
