name: Deploy

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
        working-directory: worker
      - run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "$N8N_WEBHOOK_URL/discord-notify" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"⚠ WorldPulse Worker デプロイ失敗\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}

  deploy-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            worker/package-lock.json
      - run: npm ci
        working-directory: worker
      - run: npm ci
        working-directory: frontend
      - run: npx tsc -b
        working-directory: frontend
      - run: npx vite build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      - run: npx wrangler pages deploy dist --project-name=worldpulse --commit-message="deploy ${{ github.sha }}"
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "$N8N_WEBHOOK_URL/discord-notify" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"⚠ WorldPulse Frontend デプロイ失敗\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
