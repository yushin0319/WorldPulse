name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bunx @biomejs/biome check .

  worker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
        working-directory: worker
      - run: bunx vitest run
        working-directory: worker

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun install --frozen-lockfile
        working-directory: worker
      - run: bunx vitest run
        working-directory: frontend
      - run: bunx tsc -b
        working-directory: frontend
      - run: bunx vite build
        working-directory: frontend
